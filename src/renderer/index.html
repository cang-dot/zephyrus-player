<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- SEO 元数据 -->
    <title>ZephyrusPlayer</title>
    <meta
      name="description"
      content="ZephyrusPlayer 音乐播放器，支持在线播放、歌词显示、音乐下载等功能。提供海量音乐资源，让您随时随地享受音乐。"
    />
    <meta
      name="keywords"
      content="ZephyrusPlayer, Zephyrus, 音乐播放器, 在线音乐, 歌词显示, 音乐下载"
    />

    <!-- 作者信息 -->
    <meta name="author" content="algerkong" />
    <meta name="author-url" content="https://github.com/algerkong" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- 资源预加载 -->
    <link rel="preload" href="./assets/icon/iconfont.css" as="style" />
    <link rel="preload" href="./assets/css/base.css" as="style" />

    <!-- 样式表 -->
    <link rel="stylesheet" href="./assets/icon/iconfont.css" />
    <link rel="stylesheet" href="./assets/css/base.css" />

    <!-- 百度统计 -->
    <script>
      var _hmt = _hmt || [];
      (function () {
        var hm = document.createElement('script');
        hm.src = 'https://hm.baidu.com/hm.js?75a7ee3d3875dfdd2fe9d134883ddcbd';
        var s = document.getElementsByTagName('script')[0];
        s.parentNode.insertBefore(hm, s);
      })();
    </script>
    <script>
      var _hmt = _hmt || [];
      (function () {
        var hm = document.createElement('script');
        hm.src = 'https://hm.baidu.com/hm.js?27b3850e627d266b20b38cce19af18f7';
        var s = document.getElementsByTagName('script')[0];
        s.parentNode.insertBefore(hm, s);
      })();
    </script>
    <!-- 动画配置 -->
    <style>
      :root {
        --animate-delay: 0.5s;
      }
    </style>
    <!-- 生产构建调试：捕获模块加载错误 -->
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.title = 'ERR:' + msg;
        document.body.innerHTML = '<pre style="position:fixed;inset:0;z-index:99999;background:red;color:white;padding:20px;font-size:16px;white-space:pre-wrap;overflow:auto;">[ERROR] ' + msg + '\n' + src + ':' + line + ':' + col + '\n' + (err && err.stack || '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<pre style="position:fixed;inset:0;z-index:99999;background:darkred;color:white;padding:20px;font-size:16px;white-space:pre-wrap;overflow:auto;">[PROMISE] ' + e.reason + '\n' + (e.reason && e.reason.stack || '') + '</pre>';
      });
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName) {
          document.body.innerHTML = '<pre style="position:fixed;inset:0;z-index:99999;background:orange;color:black;padding:20px;font-size:16px;white-space:pre-wrap;overflow:auto;">[RESOURCE FAIL] ' + e.target.tagName + ' ' + (e.target.src || e.target.href || 'unknown') + '</pre>';
        }
      }, true);
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
